# minecraft-easy-chunkloader configuration
#
# How it works:
#   Players place a "Chunk Loader" block (a renamed Lodestone by default). While it is
#   placed, the plugin holds a Paper *plugin chunk ticket* on the surrounding chunks,
#   which keeps them fully loaded AND ticking - farms, furnaces, redstone and mob
#   spawners keep running even when no player is nearby. Loaders are saved to
#   loaders.yml and their tickets are re-applied automatically on every server start.

# The block players place to create a chunk loader. Must be a valid, placeable Material.
# Lodestone fits thematically (it "anchors" the world) and is easy to obtain/recognise.
loader-material: LODESTONE

# How many chunks around the loader's own chunk to keep loaded.
#   0 -> 1 chunk   (just the loader's chunk) -- the default: one loader == one chunk,
#                  for maximum precision over exactly which chunks stay loaded
#   1 -> 3x3 = 9 chunks
#   2 -> 5x5 = 25 chunks
# Existing loaders keep the radius they were created with; this only affects new ones.
chunk-radius: 0

# Hard cap on chunk-radius. Stops a typo in chunk-radius from force-loading half the world.
max-radius: 4

# There are no per-player loader limits. Admins control distribution (loaders are only
# obtainable via /cl give) and can audit/remove everything with /cl list all and /cl gui all.

# Stop mobs from spawning on top of the loader block (it's a full solid block, so hostiles
# could otherwise spawn on it whenever a player is in range). Only blocks world-driven spawns
# (natural, spawners, raids, …); deliberate ones (spawn eggs, breeding, /summon) still work.
prevent-mob-spawns-on-loader: true

# Ambient "enchanted" aura shown above active loaders so players can see they're working.
# The configured particle is drawn as a slowly rotating ring around the block, plus a bright
# core spark, plus (optionally) enchanting-table glyphs streaming into it.
particles:
  enabled: true
  # Any org.bukkit.Particle name (data-less ones only). ELECTRIC_SPARK / END_ROD /
  # SOUL_FIRE_FLAME / GLOW / WAX_ON all look good as the aura.
  type: ELECTRIC_SPARK
  # How often (in ticks) to refresh the effect. Lower = smoother rotation. 20 ticks = 1s.
  interval-ticks: 15
  # Number of particles in the ring (also the glyph count). Higher = denser aura.
  count: 14
  # Stream enchanting-table glyphs into the block for an enchanted look.
  enchant-glyphs: true

# Re-apply tickets / re-validate every loader on this interval (ticks). Also drops loaders
# whose block was removed while the chunk was unloaded (e.g. WorldEdit). 0 disables it.
revalidate-interval-ticks: 1200

# Prefix prepended to every plugin message. MiniMessage format.
prefix: '<gradient:#41c7c7:#3aa0ff><bold>ChunkLoader</bold></gradient> <dark_gray>»</dark_gray> '

# All player-facing messages. MiniMessage format. Available placeholders are noted per line.
messages:
  # <name> <x> <y> <z> <world> <chunks>
  placed: '<green>Chunk loader <white><name></white> placed. Keeping <white><chunks></white> chunk(s) loaded.</green>'
  removed: '<yellow>Chunk loader <white><name></white> removed.</yellow>'
  renamed: '<green>Renamed chunk loader to <white><name></white>.</green>'
  name-usage: '<yellow>Usage: /<command> name <nickname...></yellow>'
  no-permission: '<red>You do not have permission to do that.</red>'
  protected: '<red>This chunk loader is protected - only an admin can remove it.</red>'
  not-a-loader: '<red>You are not looking at (or standing on) a chunk loader.</red>'
  given: '<green>Gave <white><amount></white> chunk loader(s) to <white><player></white>.</green>'
  received: '<green>You received <white><amount></white> chunk loader(s).</green>'
  reloaded: '<green>Configuration reloaded. <gray><loaders> loader(s) active.</gray>'
  list-header: '<aqua>Chunk loaders (<white><count></white>):</aqua>'
  # <index> <name> <world> <x> <y> <z> <chunks> <owner>
  list-entry: '<gray><index>.</gray> <aqua><name></aqua> <dark_gray>-</dark_gray> <white><world></white> @ <white><x>, <y>, <z></white> <dark_gray>(</dark_gray><gray><chunks> chunk(s), owner <owner></gray><dark_gray>)</dark_gray>'
  list-empty: '<gray>No chunk loaders placed yet.</gray>'

# Log every ticket add/remove to the console.
debug: false
