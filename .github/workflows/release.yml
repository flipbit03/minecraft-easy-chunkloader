name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      # Tag v0.1.0 -> plugin version 0.1.0 -> minecraft-easy-chunkloader-v0.1.0.jar
      - name: Build plugin
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: ./gradlew build -PpluginVersion="${TAG#v}"

      - name: Attach jar to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" "build/libs/minecraft-easy-chunkloader-${TAG}.jar" --clobber
